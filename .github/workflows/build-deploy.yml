name: Build and Deploy (Bot-Triggered)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - dev1
          - dev2
concurrency:
  group: build-deploy-${{ inputs.environment }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build:
    uses: ./.github/workflows/build-wif.yml
    with:
      environment: ${{ inputs.environment }}
      image_tag: ${{ github.sha }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

  gitops-promote:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - name: Promote image tags
        env:
          IMAGE_TAG: ${{ github.sha }}
          ENV: ${{ inputs.environment }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Configure SSH via GCP Secret Manager (no ~/.ssh setup needed)
          gcloud secrets versions access latest \
            --secret=ii-agent-dev-argocd-deploy-key \
            --project=backend-alpha-97077 > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          export GIT_SSH_COMMAND="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new"

          # Shallow clone, single branch
          git clone --depth 1 --single-branch -b main \
            git@github.com:Intelligent-Internet/ii-infras-mono.git infra-repo
          cd infra-repo

          # Update backend + frontend image tags
          sed -i 's|tag: ".*"|tag: "'"${IMAGE_TAG}"'"|' \
            "charts/ii-agent/envs/${ENV}.yaml" \
            "charts/frontend/envs/${ENV}.yaml"

          # Commit and push (skip if no diff)
          git config user.name "ii-deploy-bot"
          git config user.email "deploy-bot@ii.inc"
          git add -A
          git diff --staged --quiet && echo "No changes to promote" && exit 0
          git commit -m "deploy(${ENV}): promote ${SOURCE_BRANCH} [${IMAGE_TAG::7}]

          Run: ${RUN_URL}"
          git push origin main

          # Cleanup
          rm -f /tmp/deploy_key
