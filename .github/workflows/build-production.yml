name: Build and Push Docker Images (Production)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'release-*'

permissions:
  contents: read

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPO_PATH: backend-alpha-97077/iirepo

jobs:
  extract-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - name: Extract tag name
        id: extract
        run: |
          # Extract full tag name (refs/tags/release-0.1.0 -> release-0.1.0)
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using release tag: $TAG"

  build-and-push-production:
    needs: extract-tag
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $REGISTRY --quiet
          echo "Docker authentication configured for $REGISTRY"

      - name: Create frontend .env file
        run: echo "${{ secrets.FRONTEND_PROD }}" > frontend/.env.local

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/frontend/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod-fe:${{ needs.extract-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod-fe:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod-fe:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod-fe:buildcache,mode=max

      - name: Clean up frontend .env file
        if: always()
        run: rm -f frontend/.env.local

      - name: Set up SSH agent for private repo access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/backend/Dockerfile
          push: true
          provenance: false
          ssh: default
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod:${{ needs.extract-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod:buildcache,mode=max

      - name: Output build information
        run: |
          echo "Environment: prod"
          echo "Image Tag: ${{ needs.extract-tag.outputs.tag }}"
          echo "Images built:"
          echo "  - ${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod-fe:${{ needs.extract-tag.outputs.tag }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod-fe:latest"
          echo "  - ${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod:${{ needs.extract-tag.outputs.tag }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.REPO_PATH }}/ii-agent-prod:latest"

  update-deploy-repo:
    needs: [extract-tag, build-and-push-production]
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_REPO_SSH_KEY }}

      - name: Clone deploy repository
        run: |
          git clone git@github.com:Intelligent-Internet/ii-agent-deploy.git deploy-repo
          cd deploy-repo
          git checkout feat/update-deployment-helm
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update image tags in values.yaml (prod)
        working-directory: deploy-repo
        run: |
          TAG="${{ needs.extract-tag.outputs.tag }}"

          # Update backend image tag
          sed -i 's|tag: ".*"|tag: "'"${TAG}"'"|' ii-agent-backend/values.yaml

          # Update celery worker image tag
          sed -i 's|tag: ".*"|tag: "'"${TAG}"'"|' ii-agent-celery-worker/values.yaml

          # Update frontend image tag
          sed -i 's|tag: ".*"|tag: "'"${TAG}"'"|' ii-agent-frontend/values.yaml

      - name: Commit and push changes
        working-directory: deploy-repo
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update prod images to ${{ needs.extract-tag.outputs.tag }}

          Triggered by: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            git push origin feat/update-deployment-helm
          fi
