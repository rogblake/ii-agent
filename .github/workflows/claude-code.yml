name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      github.actor != 'claude[bot]' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.comment.user.type != 'Bot') ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && github.event.comment.user.type != 'Bot') ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && github.event.review.user.type != 'Bot') ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Manually install Claude Code (workaround for lock file issue)
        run: |
          # Set up variables
          GCS_BUCKET="https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases"
          DOWNLOAD_DIR="$HOME/.claude/downloads"
          mkdir -p "$DOWNLOAD_DIR"

          # Get latest version and download
          version=$(curl -fsSL "$GCS_BUCKET/stable")
          platform="linux-x64"
          binary_path="$DOWNLOAD_DIR/claude-$version-$platform"

          echo "Installing Claude Code version: $version"
          curl -fsSL "$GCS_BUCKET/$version/$platform/claude" -o "$binary_path"
          chmod +x "$binary_path"

          # Create local bin directory and copy binary
          mkdir -p "$HOME/.local/bin"
          cp "$binary_path" "$HOME/.local/bin/claude"

          # Add to PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          # Verify installation
          "$HOME/.local/bin/claude" --version

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_claude_code_executable: /home/runner/.local/bin/claude
          # Use consistent branch naming without timestamp to reuse branches
          branch_name_template: "{{prefix}}{{entityType}}-{{entityNumber}}"
          claude_args: |
            --model claude-opus-4-5-20251101
            --system-prompt "IMPORTANT: Before making changes, check if a branch for this issue already exists using 'git branch -a | grep issue-{{issue_number}}' or 'gh pr list --head'. If a branch exists, check it out and continue working on it. If a PR already exists, continue working on that branch. Only create a new branch if none exists. When you make code changes, ALWAYS create a pull request at the end (or update the existing PR). After implementing and testing changes, use 'gh pr create' or 'gh pr edit' to create/update the PR with a clear title and description. Include what was changed and why. Follow the project's coding standards."
