services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iiagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iiagent}
      POSTGRES_DB: ${POSTGRES_DB:-iiagentdev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iiagent} -d ${POSTGRES_DB:-iiagentdev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-1420}:3000"

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
      ssh:
        - default
    init: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .stack.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-application-credentials.json
      DATABASE_URL: ${DATABASE_URL}
      REDIS_SESSION_URL: redis://redis:6379/1
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./docker/.dummy-credentials.json}:/app/google-application-credentials.json:ro
      - ii-agent-filestore:/.ii_agent
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  celery:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
      ssh:
        - default
    init: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .stack.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-application-credentials.json
      DATABASE_URL: ${DATABASE_URL}
      REDIS_SESSION_URL: redis://redis:6379/1
      II_AGENT_SKIP_MIGRATIONS: "1"
    command: ["worker"]
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./docker/.dummy-credentials.json}:/app/google-application-credentials.json:ro
      - ii-agent-filestore:/.ii_agent

volumes:
  postgres-data:
  redis-data:
  ii-agent-filestore:
