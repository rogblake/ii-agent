# II-Agent LLM Model Configurations
# Copy this file to model_configs.yaml and fill in your API keys.
# Set MODEL_CONFIGS_FILE=model_configs.yaml in .env to use this file.
# Or set MODEL_CONFIGS='[...]' as an inline JSON array in .env.
#
# Format: a list of model entries. Each entry maps directly to a ModelSetting row.
#
# Required fields:
#   model_id:      Model identifier for the API (e.g. "gpt-5.2", "claude-sonnet-4-5@20250929")
#   provider:      OpenAI | Anthropic | Google | Cerebras | Custom
#
# Optional fields:
#   api_key:       API key (omit for Vertex AI service account auth)
#   base_url:      Custom API endpoint (required for Custom provider)
#   display_name:  Human-readable name shown in the UI
#   is_default:    true to mark as the default model (only one should be true)
#   params:        Provider-specific settings (all optional, sensible defaults applied)
#     api_type:           Hosting platform: vertex_ai | azure | bedrock (null = direct API)
#     max_retries:        (default: 3)
#     max_message_chars:  (default: 30000)
#     temperature:        (default: 0.0)
#     thinking_tokens:    (default: 16000) Extended thinking budget
#     vertex_region:      GCP region (when api_type: vertex_ai)
#     vertex_project_id:  GCP project (when api_type: vertex_ai)
#     azure_endpoint:     Azure OpenAI endpoint (when api_type: azure)
#     azure_api_version:  Azure API version (when api_type: azure)
#     cot_model:          (default: false) Chain-of-thought model flag

# ─── Default Model (pick one, set is_default: true) ──────────────

# Option A: OpenAI
# - model_id: gpt-5.2
#   provider: OpenAI
#   api_key: sk-proj-...
#   display_name: GPT-5.2
#   is_default: true

# Option B: Anthropic (direct API)
