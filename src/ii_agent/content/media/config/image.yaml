# Suggestions for image generation prompts
suggestions:
  - "Render cinematic perfume visuals on frosted glass"
  - "Design cyberpunk mech poster with brand markings"
  - "Create editorial portrait with dramatic rim light"

# Suggestions for storybook generation prompts
storybook_suggestions:
  - "Summarize the entire Harry Potter story for me in a Ghibli-style storybook"
  - "Illustrate a children's story about a magical forest with friendly animals"
  - "Create a storybook about a brave little toaster who goes on an adventure to find his owner"
