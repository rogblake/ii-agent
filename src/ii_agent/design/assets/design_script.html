<script data-design-ignore="true">
(function() {
    'use strict';

    // Prevent double initialization
    if (window.__DESIGN_MODE_RUNTIME__) {
        console.log('[DesignMode] Runtime already initialized');
        return;
    }

    // Tracked CSS properties
    const TRACKED_PROPERTIES = [
        'font-family', 'font-size', 'font-weight', 'color',
        'background-color', 'border-radius', 'padding', 'margin'
    ];

    // Selectors for editable elements (include SVG so icons can be targeted even when not using lucide classes)
    const EDITABLE_SELECTORS = 'h1,h2,h3,h4,h5,h6,p,span,a,button,div,section,article,header,footer,nav,main,aside,img,svg,input,textarea,select,ul,ol,li,label,form';

    // Elements to ignore
    const IGNORE_SELECTORS = '[data-design-ignore], script, style, link, meta, noscript';

		    window.__DESIGN_MODE_RUNTIME__ = {
		        enabled: false,
		        idCounter: 0,
		        _markScheduled: false,
		        _markTimeout: null,
		        _mutationObserver: null,
			        pendingChanges: new Map(),
	            styleOverrides: {},
	            iconOverrides: {},
	            styleOverrideEl: null,
	            _styleRenderScheduled: false,
	            _styleRenderHandle: null,
	            _applyIconOverridesScheduled: false,
	            _applyIconOverridesTimeout: null,
	            _isApplyingIconOverrides: false,
			        selectedElement: null,
			        hoveredElement: null,
	        highlightOverlay: null,
	        selectionOverlay: null,
	        temporaryHighlightOverlay: null,
        temporaryHighlightTimeout: null,
        temporaryHighlightAnimFrame: null,
        isTemporaryHighlightActive: false,
        loadingOverlay: null,
        loadingCard: null,
        loadingSpinner: null,
        loadingLabel: null,
        loadingElement: null,
        loadingDesignId: null,
        _spinnerKeyframesInstalled: false,
        // Drag/swap state
        dragCandidate: null,
        dragStartX: 0,
        dragStartY: 0,
        isDragging: false,
        draggingElement: null,
        dragTarget: null,
        dragDropMode: null,
        dragGhost: null,
        dragGhostOffsetX: 0,
        dragGhostOffsetY: 0,
        suppressNextClick: false,
        // Resize state
        resizeHandles: null,
        hoverResizeHandle: null,
        isResizing: false,
        resizeHandle: null,
        resizeStartX: 0,
        resizeStartY: 0,
        resizeStartWidth: 0,
        resizeStartHeight: 0,
        resizeElement: null,

			        init: function() {
			            console.log('[DesignMode] Initializing runtime...');
			            this.createOverlays();
                this.ensureStyleOverrideSheet();
			            this.syncIdCounterFromExistingIds();
			            this.notifyParent('DESIGN_MODE_READY', { ready: true });
			            console.log('[DesignMode] Runtime ready');
			        },

	        syncIdCounterFromExistingIds: function() {
	            // Prevent collisions when the source already contains stable IDs or when we
	            // backfill `design-el-*` IDs into source.
	            try {
	                var max = -1;
	                var els = document.querySelectorAll('[data-design-id^="design-el-"]');
	                els.forEach(function(el) {
	                    var v = el.getAttribute('data-design-id') || '';
	                    var m = v.match(/^design-el-(\d+)$/);
	                    if (m && m[1]) {
	                        var n = parseInt(m[1], 10);
	                        if (!isNaN(n) && n > max) max = n;
	                    }
	                });
	                if (max >= 0) {
	                    this.idCounter = max + 1;
	                }
	            } catch (e) {
	                // ignore
	            }
	        },

	        scheduleMarkElements: function() {
	            var self = this;
	            if (this._markScheduled) return;
	            this._markScheduled = true;
	            if (this._markTimeout) {
	                clearTimeout(this._markTimeout);
	            }
		            this._markTimeout = setTimeout(function() {
		                self._markScheduled = false;
		                self._markTimeout = null;
		                self.markElements();
		                try { self.revealHiddenMotionElements(); self.revealHiddenAosElements(); } catch (e) {}
                        try { self.updateOverlayPositions(); } catch (e) {}
		            }, 200);
		        },

		        scheduleApplyIconOverrides: function() {
		            var self = this;
		            if (this._applyIconOverridesScheduled) return;
		            this._applyIconOverridesScheduled = true;
		            if (this._applyIconOverridesTimeout) {
		                clearTimeout(this._applyIconOverridesTimeout);
		            }
		            this._applyIconOverridesTimeout = setTimeout(function() {
		                self._applyIconOverridesScheduled = false;
		                self._applyIconOverridesTimeout = null;
		                self.applyIconOverrides();
		            }, 80);
		        },

		        applyIconOverrides: function() {
		            var self = this;
		            if (this._isApplyingIconOverrides) return;
		            var hasAny = false;
		            try {
		                if (!this.iconOverrides) this.iconOverrides = {};
		                for (var k in this.iconOverrides) {
		                    if (this.iconOverrides.hasOwnProperty(k)) { hasAny = true; break; }
		                }
		            } catch (e) { hasAny = false; }
		            if (!hasAny) return;

		            var computeSigFromRoot = function(root) {
		                try {
		                    if (!root || !root.querySelectorAll) return '';
		                    var shapes = root.querySelectorAll('path,line,polyline,polygon,rect,circle,ellipse');
		                    if (!shapes || !shapes.length) return '';
		                    var parts = [];
		                    var max = Math.min(80, shapes.length);
		                    for (var i = 0; i < max; i++) {
		                        var s = shapes[i];
		                        if (!s || !s.getAttribute) continue;
		                        var tag = '';
		                        try { tag = (s.tagName || '').toLowerCase(); } catch (e) { tag = ''; }
		                        if (!tag) continue;
		                        var attrs = [];
		                        if (tag === 'path') {
		                            attrs.push('d=' + (s.getAttribute('d') || ''));
		                        } else if (tag === 'line') {
		                            attrs.push('x1=' + (s.getAttribute('x1') || ''));
		                            attrs.push('y1=' + (s.getAttribute('y1') || ''));
		                            attrs.push('x2=' + (s.getAttribute('x2') || ''));
		                            attrs.push('y2=' + (s.getAttribute('y2') || ''));
		                        } else if (tag === 'rect') {
		                            attrs.push('x=' + (s.getAttribute('x') || ''));
		                            attrs.push('y=' + (s.getAttribute('y') || ''));
		                            attrs.push('w=' + (s.getAttribute('width') || ''));
		                            attrs.push('h=' + (s.getAttribute('height') || ''));
		                            attrs.push('rx=' + (s.getAttribute('rx') || ''));
		                            attrs.push('ry=' + (s.getAttribute('ry') || ''));
		                        } else if (tag === 'circle') {
		                            attrs.push('cx=' + (s.getAttribute('cx') || ''));
		                            attrs.push('cy=' + (s.getAttribute('cy') || ''));
		                            attrs.push('r=' + (s.getAttribute('r') || ''));
		                        } else if (tag === 'ellipse') {
		                            attrs.push('cx=' + (s.getAttribute('cx') || ''));
		                            attrs.push('cy=' + (s.getAttribute('cy') || ''));
		                            attrs.push('rx=' + (s.getAttribute('rx') || ''));
		                            attrs.push('ry=' + (s.getAttribute('ry') || ''));
		                        } else if (tag === 'polyline' || tag === 'polygon') {
		                            attrs.push('points=' + (s.getAttribute('points') || ''));
		                        }
		                        parts.push(tag + ':' + attrs.join(','));
		                    }
		                    return parts.join('|');
		                } catch (e) {
		                    return '';
		                }
		            };

		            this._isApplyingIconOverrides = true;
		            try {
		                for (var designId in this.iconOverrides) {
		                    if (!this.iconOverrides.hasOwnProperty(designId)) continue;
		                    var ov = this.iconOverrides[designId];
		                    if (!ov) continue;
		                    var iconName = ov.iconName || ov.icon_name || ov.name || '';
		                    var svgInner = ov.svgInner || ov.svg_inner || ov.svg || '';
		                    if (!svgInner) continue;

		                    // Skip only if the current SVG signature matches the expected override signature.
		                    try {
		                        var el = document.querySelector('[data-design-id="' + designId + '"]');
		                        if (!el) continue;
		                        var svg = null;
		                        if (el.tagName && String(el.tagName).toLowerCase() === 'svg') {
		                            svg = el;
		                        } else {
		                            svg = el.querySelector('svg.lucide') || el.querySelector('svg');
		                        }
		                        if (svg) {
		                            var expectedSig = ov.sig || '';
		                            if (!expectedSig) {
		                                try {
		                                    var parser = new DOMParser();
		                                    var doc = parser.parseFromString('<svg xmlns="http://www.w3.org/2000/svg">' + svgInner + '</svg>', 'image/svg+xml');
		                                    var parsedSvg = doc && doc.documentElement ? doc.documentElement : null;
		                                    expectedSig = computeSigFromRoot(parsedSvg);
		                                    if (expectedSig) {
		                                        try { ov.sig = expectedSig; } catch (e) {}
		                                    }
		                                } catch (e) {}
		                            }

		                            var currentSig = computeSigFromRoot(svg);
		                            if (expectedSig && currentSig && expectedSig === currentSig) {
		                                continue;
		                            }
		                        }
		                    } catch (e) {}

		                    this.setIcon(designId, iconName, svgInner, true);
		                }
		            } catch (e) {
		                // best-effort; ignore
		            } finally {
		                this._isApplyingIconOverrides = false;
		            }
		        },

		        startMutationObserver: function() {
		            var self = this;
		            if (this._mutationObserver) return;
		            if (!window.MutationObserver) return;
		            try {
		                this._mutationObserver = new MutationObserver(function(mutations) {
		                    if (self._isApplyingIconOverrides) return;
		                    for (var i = 0; i < mutations.length; i++) {
		                        var m = mutations[i];
		                        if (m.type === 'childList' && ((m.addedNodes && m.addedNodes.length) || (m.removedNodes && m.removedNodes.length))) {
		                            self.scheduleMarkElements();
		                            self.scheduleApplyIconOverrides();
		                            break;
		                        }
		                    }
		                });
		                this._mutationObserver.observe(document.documentElement || document.body, {
		                    childList: true,
	                    subtree: true
	                });
	            } catch (e) {
	                this._mutationObserver = null;
	            }
	        },

	        enable: function() {
	            if (this.enabled) return;
		            this.enabled = true;
		            this.attachEventListeners();
		            document.body.style.cursor = 'pointer';
		            try { this.markElements(); this.startMutationObserver(); } catch (e) {}
		            try { this.applyIconOverrides(); } catch (e) {}
		            try {
		                var self = this;
		                setTimeout(function() { self.revealHiddenMotionElements(); self.revealHiddenAosElements(); }, 50);
		                setTimeout(function() { self.revealHiddenMotionElements(); self.revealHiddenAosElements(); }, 500);
	            } catch (e) {}
	            console.log('[DesignMode] Enabled');
	        },

        disable: function() {
            if (!this.enabled) return;
            this.enabled = false;
            this.detachEventListeners();
            this.hideHighlight();
            this.hideSelection();
            this.hideLoading();
            document.body.style.cursor = '';
            this.selectedElement = null;
            this.hoveredElement = null;
            this.loadingElement = null;
            this.loadingDesignId = null;
            try {
                if (this._mutationObserver) {
                    this._mutationObserver.disconnect();
                    this._mutationObserver = null;
                }
            } catch (e) {}
            console.log('[DesignMode] Disabled');
        },

        createOverlays: function() {
            // Highlight overlay (hover)
            this.highlightOverlay = document.createElement('div');
            this.highlightOverlay.id = 'design-mode-highlight';
            this.highlightOverlay.setAttribute('data-design-ignore', 'true');
            this.highlightOverlay.style.cssText =
                'position:fixed;pointer-events:none;border:2px dashed #bee6f0;' +
                'background:rgba(190,230,240,0.12);z-index:999998;display:none;transition:all 0.1s ease;';
            document.body.appendChild(this.highlightOverlay);

            // Selection overlay (click)
            this.selectionOverlay = document.createElement('div');
            this.selectionOverlay.id = 'design-mode-selection';
            this.selectionOverlay.setAttribute('data-design-ignore', 'true');
            this.selectionOverlay.style.cssText =
                'position:fixed;pointer-events:none;border:2px solid #bee6f0;' +
                'background:rgba(190,230,240,0.14);z-index:999999;display:none;';
            document.body.appendChild(this.selectionOverlay);

            // Temporary highlight overlay (for viewing changes list)
            this.temporaryHighlightOverlay = document.createElement('div');
            this.temporaryHighlightOverlay.id = 'design-mode-temp-highlight';
            this.temporaryHighlightOverlay.setAttribute('data-design-ignore', 'true');
            this.temporaryHighlightOverlay.style.cssText =
                'position:fixed;pointer-events:none;border:3px solid #f59e0b;' +
                'background:rgba(245,158,11,0.2);z-index:1000000;display:none;' +
                'box-shadow:0 0 10px rgba(245,158,11,0.5);';
            document.body.appendChild(this.temporaryHighlightOverlay);

            // Loading overlay (AI apply) - bouncing text animation
            this.ensureBouncingTextKeyframes();
            this.loadingOverlay = document.createElement('div');
            this.loadingOverlay.id = 'design-mode-loading';
            this.loadingOverlay.setAttribute('data-design-ignore', 'true');
            this.loadingOverlay.style.cssText =
                'position:fixed;pointer-events:none;z-index:1000001;display:none;' +
                'align-items:center;justify-content:center;' +
                'overflow:hidden;' +
                'backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);';

            this.loadingCard = document.createElement('div');
            this.loadingCard.setAttribute('data-design-ignore', 'true');
            this.loadingCard.style.cssText =
                'display:flex;align-items:center;justify-content:center;' +
                'gap:0;padding:0;border-radius:0;' +
                'background:transparent;border:0;box-shadow:none;';

            // Create bouncing text loading indicator
            this.loadingTextContainer = document.createElement('div');
            this.loadingTextContainer.setAttribute('data-design-ignore', 'true');
            this.loadingTextContainer.style.cssText =
                'display:flex;align-items:center;gap:4px;' +
                'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;' +
                'font-size:14px;font-weight:600;letter-spacing:0.02em;line-height:1;' +
                'color:#a6ffff;'; // sky-blue-2 matching active tab text

            // Create bouncing text "II-Agent Generating..."
            var text = 'II-Agent Generating...';
            for (var i = 0; i < text.length; i++) {
                var charSpan = document.createElement('span');
                charSpan.setAttribute('data-design-ignore', 'true');
                charSpan.textContent = text[i] === ' ' ? '\u00a0' : text[i]; // Use non-breaking space
                charSpan.style.cssText =
                    'display:inline-block;' +
                    'animation:design-mode-bounce 1.4s ease-in-out infinite;' +
                    'animation-delay:' + (i * 0.05) + 's;';
                this.loadingTextContainer.appendChild(charSpan);
            }

            // Create compact spinner for small elements
            this.loadingSpinner = document.createElement('div');
            this.loadingSpinner.setAttribute('data-design-ignore', 'true');
            this.loadingSpinner.style.cssText =
                'width:16px;height:16px;' +
                'border-radius:50%;' +
                'border:2px solid #bfdbfe;' + // blue-200
                'border-top-color:#2563eb;' + // blue-600
                'animation:design-mode-spin 0.8s linear infinite;' +
                'display:none;';
            this.loadingCard.appendChild(this.loadingTextContainer);
            this.loadingCard.appendChild(this.loadingSpinner);
            this.loadingOverlay.appendChild(this.loadingCard);
            document.body.appendChild(this.loadingOverlay);
        },

        ensureBouncingTextKeyframes: function() {
            if (this._bouncingTextKeyframesInstalled) return;
            this._bouncingTextKeyframesInstalled = true;
            try {
                if (document.getElementById('design-mode-bouncing-text-keyframes')) return;
                var styleEl = document.createElement('style');
                styleEl.id = 'design-mode-bouncing-text-keyframes';
                styleEl.setAttribute('data-design-ignore', 'true');
                styleEl.textContent =
                    '@keyframes design-mode-shimmer {' +
                    '0% { background-position: -200% 0; }' +
                    '100% { background-position: 200% 0; }' +
                    '}' +
                    '@keyframes design-mode-bounce {' +
                    '0%, 60%, 100% { transform: translateY(0); }' +
                    '30% { transform: translateY(-8px); }' +
                    '}' +
                    '@keyframes design-mode-spin {' +
                    'from { transform: rotate(0deg); }' +
                    'to { transform: rotate(360deg); }' +
                    '}';
                document.head.appendChild(styleEl);
            } catch (e) {}
        },

        showLoading: function(element) {
            if (!element || !this.loadingOverlay) return;
            try {
                if (!document.documentElement.contains(element)) {
                    this.hideLoading();
                    return;
                }
                var rect = element.getBoundingClientRect();
                this.loadingOverlay.style.display = 'flex';
                this.loadingOverlay.style.top = rect.top + 'px';
                this.loadingOverlay.style.left = rect.left + 'px';
                this.loadingOverlay.style.width = rect.width + 'px';
                this.loadingOverlay.style.height = rect.height + 'px';

                // Make it feel like it's "attached" to the element.
                try {
                    var cs = window.getComputedStyle(element);
                    if (cs && cs.borderRadius) {
                        this.loadingOverlay.style.borderRadius = cs.borderRadius;
                    }
                } catch (e) {}

                // Switch between text and spinner based on element size
                var width = rect.width || 0;
                var height = rect.height || 0;

                // Thresholds: Show text if element is wide enough (200px) AND tall enough (40px)
                // This ensures we have enough space to fit "II Agent thinking..." text
                var minWidth = 200;
                var minHeight = 40;
                var useText = width >= minWidth && height >= minHeight;

                // Detect dark mode
                var isDarkMode = false;
                try {
                    isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                } catch (e) {}

                if (useText) {
                    // Show modern shimmer effect with icon and text for larger elements
                    if (isDarkMode) {
                        // Dark mode colors
                        this.loadingOverlay.style.background =
                            'linear-gradient(90deg, ' +
                            'rgba(30, 41, 59, 0.85) 0%, ' +      // slate-800
                            'rgba(51, 65, 85, 0.95) 20%, ' +     // slate-700 shimmer
                            'rgba(30, 41, 59, 0.85) 40%, ' +     // slate-800
                            'rgba(30, 41, 59, 0.85) 100%)';
                    } else {
                        // Light mode colors
                        this.loadingOverlay.style.background =
                            'linear-gradient(90deg, ' +
                            'rgba(239, 246, 255, 0.85) 0%, ' +   // blue-50
                            'rgba(219, 234, 254, 0.95) 20%, ' +  // blue-100 shimmer
                            'rgba(239, 246, 255, 0.85) 40%, ' +  // blue-50
                            'rgba(239, 246, 255, 0.85) 100%)';
                    }
                    this.loadingOverlay.style.backgroundSize = '200% 100%';
                    this.loadingOverlay.style.animation = 'design-mode-shimmer 1.5s ease-in-out infinite';

                    if (this.loadingSpinner) {
                        this.loadingSpinner.style.display = 'none';
                    }
                    if (this.loadingTextContainer) {
                        this.loadingTextContainer.style.display = 'flex';
                        // Update text color for dark mode
                        if (isDarkMode) {
                            this.loadingTextContainer.style.color = '#a6ffff'; // sky-blue-2 in sage theme (sandy gold)
                        } else {
                            this.loadingTextContainer.style.color = '#a6ffff'; // sky-blue-2 (matching active tab text)
                        }
                    }
                } else {
                    // Show shimmer background with compact spinner for small elements
                    if (isDarkMode) {
                        this.loadingOverlay.style.background =
                            'linear-gradient(90deg, ' +
                            'rgba(30, 41, 59, 0.75) 0%, ' +
                            'rgba(51, 65, 85, 0.9) 50%, ' +
                            'rgba(30, 41, 59, 0.75) 100%)';
                    } else {
                        this.loadingOverlay.style.background =
                            'linear-gradient(90deg, ' +
                            'rgba(239, 246, 255, 0.75) 0%, ' +
                            'rgba(219, 234, 254, 0.9) 50%, ' +
                            'rgba(239, 246, 255, 0.75) 100%)';
                    }
                    this.loadingOverlay.style.backgroundSize = '200% 100%';
                    this.loadingOverlay.style.animation = 'design-mode-shimmer 1.5s ease-in-out infinite';

                    // Show only spinner for small elements
                    if (this.loadingTextContainer) {
                        this.loadingTextContainer.style.display = 'none';
                    }
                    if (this.loadingSpinner) {
                        this.loadingSpinner.style.display = 'flex';
                        // Update spinner colors for dark mode
                        if (isDarkMode) {
                            this.loadingSpinner.style.borderColor = '#334155'; // slate-700
                            this.loadingSpinner.style.borderTopColor = '#60a5fa'; // blue-400
                        }
                    }
                }
            } catch (e) {}
        },

        hideLoading: function() {
            if (this.loadingOverlay) this.loadingOverlay.style.display = 'none';
        },

        setElementLoading: function(designId, isLoading, xpath) {
            try {
                if (!isLoading) {
                    this.loadingElement = null;
                    this.loadingDesignId = null;
                    this.hideLoading();
                    return;
                }

                this.loadingDesignId = designId;
                var el = null;
                if (designId) {
                    el = document.querySelector('[data-design-id="' + designId + '"]');
                }
                if (!el && xpath) {
                    el = this.findByXPath(xpath);
                    if (el && el.setAttribute && designId) {
                        try { el.setAttribute('data-design-id', designId); } catch (e) {}
                    }
                }

                this.loadingElement = el;
                if (el) this.showLoading(el);
                else this.hideLoading();
            } catch (e) {}
        },

	        markElements: function() {
	            var self = this;
	            var started = Date.now();
	            var elements = document.querySelectorAll(EDITABLE_SELECTORS);
	            var marked = 0;
	            elements.forEach(function(el) {
	                if (el.closest(IGNORE_SELECTORS)) return;
	                if (!el.hasAttribute('data-design-id')) {
	                    // Avoid generating ephemeral IDs inside stable, author-provided design-id scopes.
	                    // This keeps selection + change tracking anchored to stable IDs so changes can be synced.
	                    var hasStableAncestor = false;
	                    try {
	                        var p = el.parentElement;
	                        while (p && p !== document.body) {
	                            if (p.hasAttribute && p.hasAttribute('data-design-id')) {
	                                var pid = p.getAttribute('data-design-id') || '';
	                                if (pid && pid.indexOf('design-el-') !== 0) {
	                                    hasStableAncestor = true;
	                                    break;
	                                }
	                            }
	                            p = p.parentElement;
	                        }
	                    } catch (e) { hasStableAncestor = false; }

	                    if (hasStableAncestor) return;

	                    el.setAttribute('data-design-id', 'design-el-' + (self.idCounter++));
	                    marked++;
	                }
	            });
	            var elapsed = Date.now() - started;
	            console.log('[DesignMode] Marked', marked, 'new elements (', self.idCounter, 'total) in', elapsed, 'ms');
	        },

	        revealHiddenMotionElements: function() {
	            // Some animation libraries (e.g. Framer Motion) render elements with initial
	            // `opacity: 0` / transformed styles. If the app doesn't hydrate, those elements
	            // can remain invisible in Design Mode, making the UI appear "missing".
	            // Pass 1: walk from design-id elements up to find inline motion styles.
	            try {
	                var designEls = document.querySelectorAll('[data-design-id]');
	                designEls.forEach(function(node) {
	                    var el = node;
	                    var depth = 0;
	                    while (el && depth < 5) {
	                        var styleAttr = '';
	                        try { styleAttr = (el.getAttribute && el.getAttribute('style')) ? el.getAttribute('style') : ''; } catch (e) {}
	                        var hasInlineOpacity = styleAttr && styleAttr.indexOf('opacity') !== -1;
	                        var hasInlineTransform = styleAttr && styleAttr.indexOf('transform') !== -1;
	                        if (hasInlineOpacity || hasInlineTransform) {
	                            try {
	                                var cs = window.getComputedStyle(el);
	                                if (cs && cs.opacity === '0' && cs.display !== 'none' && cs.visibility !== 'hidden') {
	                                    if (hasInlineOpacity) {
	                                        el.style.setProperty('opacity', '1', 'important');
	                                    }
	                                    if (hasInlineTransform && cs.transform && cs.transform !== 'none') {
	                                        el.style.setProperty('transform', 'none', 'important');
	                                    }
	                                }
	                            } catch (e) {}
	                            break;
	                        }
	                        el = el.parentElement;
	                        depth++;
	                    }
	                });

	                    if (!appliedAttr && payload && payload.xpath) {
	                        var elAttr = this.findByXPath(payload.xpath);
	                        if (elAttr && elAttr.setAttribute) {
	                            try { elAttr.setAttribute('data-design-id', payload.designId); } catch (e) {}
	                            this.setAttribute(payload.designId, attrName, attrValue, payload.skipTracking, payload.slideNumber, { groupId: payload.groupId, groupLabel: payload.groupLabel });
	                        }
	                    }
	                    break;
	                    case 'DESIGN_MODE_SET_ICON':
	                        var iconName = payload.iconName || payload.icon_name || payload.name;
	                        var svgInner = payload.svgInner || payload.svg_inner || payload.svg;
	                        var appliedIcon = this.setIcon(payload.designId, iconName, svgInner, payload.skipTracking, payload.slideNumber);
	                        if (!appliedIcon && payload && payload.xpath) {
	                            var elIcon = this.findByXPath(payload.xpath);
	                            if (elIcon && elIcon.setAttribute) {
	                                try { elIcon.setAttribute('data-design-id', payload.designId); } catch (e) {}
	                                appliedIcon = this.setIcon(payload.designId, iconName, svgInner, payload.skipTracking, payload.slideNumber);
	                            }
	                        }
	                        try {
	                            this.notifyParent('DESIGN_MODE_OP_RESULT', {
	                                op: 'set_icon',
	                                designId: payload.designId,
	                                ok: !!appliedIcon,
	                                iconName: iconName || null,
	                                error: this._lastOpError || null,
	                                debug: this._lastOpDebug || null
	                            });
	                        } catch (e) {}
	                        break;
	                    case 'DESIGN_MODE_MOVE_ELEMENT':
	                        var moved = this.moveElementByDesignId(payload.designId, payload.anchor, payload.skipTracking, payload.slideNumber);
	                        if (!moved && payload && payload.xpath) {
	                            try {
	                                var elMove = this.findByXPath(payload.xpath);
	                                if (elMove && elMove.setAttribute) {
	                                    try { elMove.setAttribute('data-design-id', payload.designId); } catch (e) {}
	                                    moved = this.moveElementByDesignId(payload.designId, payload.anchor, payload.skipTracking, payload.slideNumber);
	                                }
	                            } catch (e) {}
	                        }
	                        break;
	                    case 'DESIGN_MODE_SWAP_ELEMENTS':
	                        var swapped = this.swapElementsByDesignId(payload.designId, payload.targetDesignId, payload.skipTracking, payload.slideNumber);
	                        if (!swapped && payload && payload.xpath) {
	                            try {
	                                var elSwap = this.findByXPath(payload.xpath);
	                                if (elSwap && elSwap.setAttribute) {
	                                    try { elSwap.setAttribute('data-design-id', payload.designId); } catch (e) {}
	                                    swapped = this.swapElementsByDesignId(payload.designId, payload.targetDesignId, payload.skipTracking, payload.slideNumber);
	                                }
	                            } catch (e) {}
	                        }
	                        break;
                    case 'DESIGN_MODE_DELETE_ELEMENT':
                        var deleted = this.deleteElementByDesignId(payload.designId, payload.skipTracking, payload.slideNumber, { groupId: payload.groupId, groupLabel: payload.groupLabel });
                        if (!deleted && payload && payload.xpath) {
                            try {
                                var elDel = this.findByXPath(payload.xpath);
                                if (elDel && elDel.setAttribute) {
                                    try { elDel.setAttribute('data-design-id', payload.designId); } catch (e) {}
                                    deleted = this.deleteElementByDesignId(payload.designId, payload.skipTracking, payload.slideNumber, { groupId: payload.groupId, groupLabel: payload.groupLabel });
                                }
                            } catch (e) {}
                        }
                        try {
                            this.notifyParent('DESIGN_MODE_OP_RESULT', {
                                op: 'delete_element',
                                designId: payload.designId,
                                ok: !!deleted,
                                error: this._lastOpError || null
                            });
                        } catch (e) {}
                        break;
                    case 'DESIGN_MODE_RESTORE_ELEMENT':
                        var restored = this.restoreElementByDesignId(payload.designId, payload.skipTracking, payload.slideNumber);
                        if (!restored && payload && payload.xpath) {
                            try {
                                var elRestore = this.findByXPath(payload.xpath);
                                if (elRestore && elRestore.setAttribute) {
                                    try { elRestore.setAttribute('data-design-id', payload.designId); } catch (e) {}
                                    restored = this.restoreElementByDesignId(payload.designId, payload.skipTracking, payload.slideNumber);
                                }
                            } catch (e) {}
                        }
                        try {
                            this.notifyParent('DESIGN_MODE_OP_RESULT', {
                                op: 'restore_element',
                                designId: payload.designId,
                                ok: !!restored,
                                error: this._lastOpError || null
                            });
                        } catch (e) {}
                        break;
                    case 'DESIGN_MODE_TOGGLE_MULTI_SELECT':
                        this.toggleMultiSelectMode(payload.enabled);
                        break;
                case 'DESIGN_MODE_CLEAR_CHANGES':
                    this.clearPendingChanges();
                    break;
                case 'DESIGN_MODE_REQUEST_SYNC':
                    this.notifyParent('DESIGN_MODE_SYNC_RESPONSE', {
                        changes: this.getPendingChanges()
                    });
                    break;
                case 'DESIGN_MODE_HIGHLIGHT_ELEMENT':
                    this.showTemporaryHighlight(payload.designId);
                    break;
	                case 'DESIGN_MODE_GET_DOCUMENT_SNAPSHOT':
	                    var requestId = payload && payload.requestId ? payload.requestId : ('snap-' + Date.now() + '-' + Math.floor(Math.random() * 1000000));
	                    var opts = payload && payload.options ? payload.options : {};
	                    console.log('[DesignMode] Getting document snapshot', requestId, opts);
	                    var snapshot = this.getDocumentSnapshot(opts);
	                    console.log('[DesignMode] Snapshot result:', { requestId: requestId, nodeCount: (snapshot && snapshot.nodes) ? snapshot.nodes.length : 0 });
	                    this.notifyParent('DESIGN_MODE_DOCUMENT_SNAPSHOT', {
	                        requestId: requestId,
	                        snapshot: snapshot
	                    });
	                    break;
	                case 'DESIGN_MODE_GET_DECK_DIMENSIONS':
	                    try {
	                        var dims = this.getDeckDimensions();
	                        this.notifyParent('DESIGN_MODE_DECK_DIMENSIONS', dims || null);
	                    } catch (e) {}
	                    break;
	            }
	        }
	    };

    // Listen for messages from parent
    window.addEventListener('message', function(e) {
        window.__DESIGN_MODE_RUNTIME__.handleParentMessage(e);
    });

    // Update overlays on scroll/resize
    window.addEventListener('scroll', function() {
        window.__DESIGN_MODE_RUNTIME__.updateOverlayPositions();
    }, true);
    window.addEventListener('resize', function() {
        window.__DESIGN_MODE_RUNTIME__.updateOverlayPositions();
    });

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            window.__DESIGN_MODE_RUNTIME__.init();
        });
    } else {
        window.__DESIGN_MODE_RUNTIME__.init();
    }
})();
</script>
